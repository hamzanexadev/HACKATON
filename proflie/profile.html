<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HelpHub AI — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-gradient-1: #d9ead0;
    --bg-gradient-2: #f3efe6;
    --bg-gradient-3: #f5dcc5;
    --card: #faf6ec;
    --dark: #2b332f;
    --teal: #0f9d83;
    --teal-dark: #0b7a66;
    --teal-soft: #d6ece5;
    --teal-text: #0d6b5a;
    --text: #1f2622;
    --muted: #6b736e;
    --line: #e6e1d4;
    --radius-lg: 28px;
    --radius-pill: 999px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text);
    background:
      radial-gradient(ellipse at top left, var(--bg-gradient-1) 0%, transparent 45%),
      radial-gradient(ellipse at top right, var(--bg-gradient-3) 0%, transparent 45%),
      var(--bg-gradient-2);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }

  /* Header */
  .header {
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(6px);
  }
  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-logo {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: var(--teal);
    color: #fff;
    display: grid; place-items: center;
    font-weight: 800;
    font-size: 18px;
  }
  .brand-name { font-weight: 700; font-size: 17px; }
  .nav { display: flex; gap: 8px; align-items: center; }
  .nav a {
    text-decoration: none;
    color: var(--muted);
    font-size: 15px;
    padding: 8px 16px;
    border-radius: var(--radius-pill);
    transition: color .2s, background .2s;
  }
  .nav a:hover { color: var(--text); }
  .nav a.active {
    background: var(--teal-soft);
    color: var(--teal-text);
    font-weight: 500;
  }

  /* Main */
  main { padding: 32px 0 64px; }

  .hero {
    background: var(--dark);
    color: #fff;
    border-radius: var(--radius-lg);
    padding: 44px 56px 48px;
  }
  .hero-eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
    margin-bottom: 18px;
  }
  .hero-name {
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .hero-meta { color: rgba(255,255,255,0.6); font-size: 15px; }

  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 32px;
  }

  .card {
    background: var(--card);
    border-radius: var(--radius-lg);
    padding: 40px 44px 44px;
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--teal-text);
    font-weight: 700;
    margin-bottom: 18px;
  }
  .card-title {
    font-size: clamp(28px, 3vw, 40px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
    margin-bottom: 28px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--line);
    font-size: 15px;
  }
  .row .value { font-weight: 500; }

  .section-label {
    font-weight: 700;
    font-size: 15px;
    margin-top: 20px;
    margin-bottom: 12px;
  }

  .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
  .chip {
    background: var(--teal-soft);
    color: var(--teal-text);
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: var(--radius-pill);
  }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  .field label {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .field input {
    font-family: inherit;
    font-size: 15px;
    padding: 14px 18px;
    border: 1px solid var(--line);
    border-radius: var(--radius-pill);
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(15,157,131,0.15);
  }

  .btn-save {
    margin-top: 22px;
    width: 100%;
    background: var(--teal);
    color: #fff;
    border: none;
    font-family: inherit;
    font-size: 16px;
    font-weight: 700;
    padding: 16px 24px;
    border-radius: var(--radius-pill);
    cursor: pointer;
    transition: background .2s, transform .05s;
    box-shadow: 0 8px 20px -8px rgba(15,157,131,0.55);
  }
  .btn-save:hover { background: var(--teal-dark); }
  .btn-save:active { transform: translateY(1px); }

  /* Tablet */
  @media (max-width: 1024px) {
    .grid { grid-template-columns: 1fr; }
    .hero { padding: 36px 36px 40px; }
    .card { padding: 32px; }
  }

  /* Mobile */
  @media (max-width: 640px) {
    .container { padding: 0 18px; }
    .nav a { padding: 6px 12px; font-size: 14px; }
    .brand-name { display: none; }
    main { padding: 20px 0 40px; }
    .hero { padding: 28px 24px 32px; border-radius: 22px; }
    .hero-name { font-size: 40px; }
    .grid { gap: 20px; margin-top: 20px; }
    .card { padding: 26px 22px; border-radius: 22px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <div class="brand">
        <div class="brand-logo">H</div>
        <div class="brand-name">HelpHub AI</div>
      </div>
      <nav class="nav">
        <a href="/index.html">Dashboard</a>
        <a href="#">Onboarding</a>
        <a href="#" class="active">Profile</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="hero">
      <div class="hero-eyebrow">PROFILE</div>
      <h1 class="hero-name">Ayesha Khan</h1>
      <div class="hero-meta">Both • Karachi</div>
    </section>

    <section class="grid">
      <article class="card">
        <div class="eyebrow">PUBLIC PROFILE</div>
        <h2 class="card-title">Skills and reputation</h2>

        <div class="row">
          <span class="label">Trust score</span>
          <span class="value">100%</span>
        </div>
        <div class="row">
          <span class="label">Contributions</span>
          <span class="value">35</span>
        </div>

        <div class="section-label">Skills</div>
        <div class="chips">
          <span class="chip">Figma</span>
          <span class="chip">UI/UX</span>
          <span class="chip">HTML/CSS</span>
          <span class="chip">Career Guidance</span>
        </div>

        <div class="section-label">Badges</div>
        <div class="chips">
          <span class="chip">Design Ally</span>
          <span class="chip">Fast Responder</span>
          <span class="chip">Top Mentor</span>
        </div>
      </article>

      <article class="card">
        <div class="eyebrow">EDIT PROFILE</div>
        <h2 class="card-title">Update your identity</h2>

        <form class="form-grid">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" type="text" value="Ayesha Khan" />
          </div>
          <div class="field">
            <label for="location">Location</label>
            <input id="location" type="text" value="Karachi" />
          </div>
          <div class="field full">
            <label for="skills">Skills</label>
            <input id="skills" type="text" value="Figma, UI/UX, HTML/CSS, Career Guidance" />
          </div>
          <div class="field full">
            <label for="interests">Interests</label>
            <input id="interests" type="text" value="Hackathons, UI/UX, Community Building" />
          </div>
          <div class="field full">
            <button type="submit" class="btn-save">Save profile</button>
          </div>
        </form>
      </article>
    </section>
  </main>

</body>
</html>
